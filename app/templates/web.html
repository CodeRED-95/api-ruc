<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SUNAT RUC API</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="page">
    <section class="card hero">
      <div>
        <p class="eyebrow">SUNAT RUC API</p>
        <h1>Consulta RUC desde el navegador</h1>
        <p class="muted">Ingresa tu API Key y un RUC de 11 dígitos para consultar el padrón.</p>
      </div>
    </section>

    <section class="card form-card">
      <form id="ruc-form">
        <label>API Key
          <input id="apiKey" type="password" placeholder="X-API-Key" required>
        </label>
        <label>RUC
          <input id="ruc" type="text" placeholder="20123456789" maxlength="11" pattern="\d{11}" required>
        </label>
        <button type="submit">Consultar</button>
      </form>
    </section>

    <section class="card result-card">
      <div id="status" class="status muted">Esperando consulta...</div>
      <pre id="output">{}</pre>
    </section>
  </main>
  <script src="/static/web.js"></script>
</body>
</html>
